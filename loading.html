<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bushra • Loading</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Inter:wght@400;500&display=swap"
    rel="stylesheet">
  <link href="style.css?v=2" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <style>
    :root {
      --bg: #f8fafc;
      --muted: #94a3b8;
      --accent: #16a34a
    }

    html,
    body {
      height: 100%
    }

    body {
      font-family: Inter, system-ui, Segoe UI, Arial, Helvetica, 'Outfit', sans-serif;
      background: var(--bg);
      margin: 0
    }

    .loader-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem
    }

    .loader-card {
      width: 100%;
      max-width: 820px;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem
    }

    /* Logo */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem
    }

    .brand img {
      height: 74px;
      width: auto;
      object-fit: contain;
      border-radius: 10px
    }

    .brand .brand-title {
      font-family: Outfit, Inter, system-ui;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: .2px
    }

    /* logo animation */
    .logo-wrap {
      display: inline-block;
      transform-origin: center center;
      animation: logo-fade 700ms ease both
    }

    @keyframes logo-fade {
      from {
        opacity: 0;
        transform: scale(.92)
      }

      to {
        opacity: 1;
        transform: scale(1)
      }
    }

    /* centered badge below logo (subtle) */
    .badge-center {
      margin-top: .25rem;
      background: #fff;
      padding: .5rem 1rem;
      border-radius: 999px;
      box-shadow: 0 8px 24px rgba(2, 6, 23, .06);
      display: inline-flex;
      gap: .6rem;
      align-items: center
    }

    .badge-year {
      font-weight: 700;
      color: var(--accent);
      font-size: 1.05rem
    }

    .badge-label {
      font-size: .66rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .14em
    }

    /* icon row */
    .icons {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: center
    }

    .icon-box {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 30px rgba(2, 6, 23, .06);
      transform-origin: center;
      transition: transform 300ms cubic-bezier(.2, .9, .2, 1)
    }

    .icon {
      font-size: 28px;
      color: var(--accent)
    }

    .icon-box:nth-child(1) {
      animation: floaty 3.6s ease-in-out infinite
    }

    .icon-box:nth-child(2) {
      animation: floaty 3.8s ease-in-out .12s infinite
    }

    .icon-box:nth-child(3) {
      animation: floaty 3.7s ease-in-out .24s infinite
    }

    @keyframes floaty {
      0% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }

      100% {
        transform: translateY(0)
      }
    }

    /* progress */
    .progress-wrap {
      width: 100%;
      max-width: 540px;
      margin-top: 12px
    }

    .progress-bar {
      height: 6px;
      background: #e6eef1;
      border-radius: 999px;
      overflow: hidden
    }

    .progress-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), #22c55e);
      transition: width 180ms linear
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: .6rem;
      color: var(--muted);
      font-size: .92rem
    }

    /* supportive text */
    .support {
      font-size: 1.05rem;
      color: #0f172a;
      margin-top: .6rem;
      text-align: center
    }

    /* tagline bottom */
    .tagline {
      margin-top: 1.6rem;
      color: var(--muted);
      font-style: italic;
      text-align: center
    }

    /* responsive tweaks */
    @media (max-width:640px) {
      .icon-box {
        width: 58px;
        height: 58px
      }

      .brand img {
        height: 64px
      }

      .progress-wrap {
        max-width: 92vw
      }
    }
  </style>
</head>

<body>
  <main class="loader-wrap">
    <div class="loader-card">
      <div class="brand">
        <div class="logo-wrap" aria-hidden>
          <img src="assets/images/img_4c03255e.png" alt="Bushra School logo">
        </div>
        <div class="brand-title">Bushra Nursery & Primary</div>
        <div class="badge-center" aria-hidden>
          <div class="badge-year">2011</div>
          <div class="badge-label">Established</div>
        </div>
      </div>

      <!-- animated icons representing learning -->
      <div class="icons" role="img" aria-label="loading icons">
        <div class="icon-box" title="Digital Learning">
          <svg class="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="6" width="18" height="12" rx="1.5" stroke="currentColor" stroke-width="1.5"
              fill="currentColor" fill-opacity="0.03" />
            <path d="M6 9h12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
            <path d="M6 12h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
          </svg>
        </div>

        <div class="icon-box" title="Graduation">
          <svg class="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"
              fill="currentColor" fill-opacity="0.03" />
            <path d="M6.5 11.25v2.5c0 2.2 3.5 3.5 5.5 3.5 2 0 5.5-1.3 5.5-3.5v-2.5" stroke="currentColor"
              stroke-width="1.2" stroke-linecap="round" />
          </svg>
        </div>

        <div class="icon-box" title="Certificate">
          <svg class="icon" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="3" width="16" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"
              fill="currentColor" fill-opacity="0.03" />
            <path d="M8 15l2.5 4L13 15" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"
              stroke-linejoin="round" />
          </svg>
        </div>
      </div>

      <!-- progress bar -->
      <div class="progress-wrap">
        <div class="progress-bar" aria-hidden>
          <div id="progressInner" class="progress-inner"></div>
        </div>
        <div class="progress-meta">
          <div id="progressMsg">Loading Courses…</div>
          <div id="progressPct">0%</div>
        </div>
      </div>

      <div class="support" id="supportText">Preparing Your Learning Experience…</div>
      <div class="tagline">Education Rooted in Values, Built for the Future.</div>
    </div>
  </main>

  <script>
    // Simple progressive loader with cycling messages and auto-redirect to index
    (function () {
      const inner = document.getElementById('progressInner');
      const pct = document.getElementById('progressPct');
      const msg = document.getElementById('progressMsg');
      const support = document.getElementById('supportText');
      const messages = ['Loading Courses…', 'Preparing Your Dashboard…', 'Setting Up Your Learning Experience…'];
      const supportMsgs = ['Preparing Your Learning Experience…', 'Applying Safe Configurations…', 'Finalizing Student Resources…'];

      let progress = 0; let target = 100; let duration = 2200; // ms
      let start = null;

      function step(ts) {
        if (!start) start = ts;
        const elapsed = ts - start;
        const t = Math.min(1, elapsed / duration);
        // ease-out
        const ease = 1 - Math.pow(1 - t, 3);
        progress = Math.floor(ease * target);
        inner.style.width = progress + '%';
        pct.textContent = progress + '%';
        if (t < 1) requestAnimationFrame(step);
        else finish();
      }

      // cycle messages
      let mi = 0; setInterval(() => { mi = (mi + 1) % messages.length; msg.textContent = messages[mi]; support.textContent = supportMsgs[mi % supportMsgs.length]; }, 700);

      function finish() {
        inner.style.width = '100%'; pct.textContent = '100%';
        // small delay to let animation finish
        setTimeout(() => { window.location = 'index.html'; }, 550);
      }

      // start animation
      requestAnimationFrame(step);

      // if real load completes earlier, finalize quickly
      window.addEventListener('load', () => { start = null; duration = 800; requestAnimationFrame(step); });
    })();
  </script>
</body>

</html>
